<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="ad.size" content="width=300,height=250">
  <meta name="viewport" content="width=300,height=250">
  <title>How-To Geek — Deals Center 300×250 (light)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 300px; height: 250px; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #ad-root {
      --ring-cycle: 2.8s;
      width: 300px; height: 250px; position: relative;
      border: 1px solid #c8ced9;
      background: linear-gradient(160deg, #f4f6fa 0%, #e8ecf4 50%, #eef1f6 100%);
      overflow: hidden;
    }
    #ad-root::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255, 106, 0, 0.1) 0%, transparent 45%);
      animation: glow-breathe 3s ease-in-out infinite;
    }
    @keyframes glow-breathe {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }
    a.exit {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100%; padding: 20px 18px 18px;
      position: relative; z-index: 2;
      text-decoration: none; color: #1a1f2e; text-align: center; cursor: pointer;
    }
    .logo {
      font-weight: 800; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
      color: #5c6778; margin-bottom: 10px;
    }
    .logo strong { color: #e85a00; letter-spacing: 0.08em; }
    h1.headline-slides {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: stretch;
      width: 100%;
      font-size: 22px;
      min-height: 1.45em;
      margin-bottom: 10px;
      overflow: visible;
    }
    .headline-slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: inherit;
      font-weight: 800;
      line-height: 1.2;
      color: #1a1f2e;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
      text-align: center;
      white-space: nowrap;
      padding: 0 10px;
      will-change: opacity, transform;
      animation-duration: calc(var(--ring-cycle) * 2);
      animation-timing-function: cubic-bezier(0.33, 0.86, 0.2, 1);
      animation-iteration-count: infinite;
    }
    .headline-slide--1 { animation-name: headline-slide-1; }
    .headline-slide--2 { animation-name: headline-slide-2; }
    @keyframes headline-slide-1 {
      0% { opacity: 0; transform: translateY(0.55em); }
      6% { opacity: 1; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(0); }
      50% { opacity: 0; transform: translateY(-0.5em); }
      50.01%, 100% { opacity: 0; transform: translateY(-0.5em); }
    }
    @keyframes headline-slide-2 {
      0%, 49.5% { opacity: 0; transform: translateY(0.55em); }
      56% { opacity: 1; transform: translateY(0); }
      88% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-0.5em); }
    }
    p.tag {
      font-size: 13px; line-height: 1.45; color: #3d4a5c; max-width: 240px; margin-bottom: 24px;
    }
    .cta {
      display: inline-flex; align-items: center; justify-content: center;
      height: 42px; padding: 0 28px;
      font-size: 15px; font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #ff6a22 0%, #c73d00 100%);
      border-radius: 8px;
      animation: cta-bounce 2.2s ease-in-out infinite;
    }
    @keyframes cta-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .ring {
      position: absolute; border: 2px solid rgba(232, 90, 0, 0.22);
      border-radius: 50%; pointer-events: none; z-index: 1;
      width: 180px; height: 180px; left: 50%; top: 42%; margin: -90px 0 0 -90px;
      animation: ring-expand var(--ring-cycle) ease-out infinite;
    }
    @keyframes ring-expand {
      0% { transform: scale(0.6); opacity: 0.55; }
      100% { transform: scale(1.35); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      #ad-root::after, .cta, .ring { animation: none !important; }
      .headline-slide { position: static; inset: auto; animation: none !important; transform: none !important; opacity: 0; }
      .headline-slide--1 { position: relative; opacity: 1; }
      .headline-slide--2 { display: none; }
      h1.headline-slides { min-height: 0; }
    }
  </style>
</head>
<body>
  <div id="ad-root" role="img" aria-label="Deals Center — hand-picked tech deals. Tap to shop.">
    <div class="ring" aria-hidden="true"></div>
    <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer">
      <div class="logo">How-To Geek <strong>Deals Center</strong></div>
      <h1 class="headline-slides">
        <span class="headline-slide headline-slide--1">Deals worth your time</span>
        <span class="headline-slide headline-slide--2">Curated by our editors</span>
      </h1>
      <p class="tag">Discounts on laptops, smart home, accessories &amp; more — updated regularly.</p>
      <span class="cta">See today’s deals</span>
    </a>
  </div>
  <script>
    var clickTag = 'https://www.howtogeek.com/deals/';
    document.getElementById('click').addEventListener('click', function (e) {
      e.preventDefault();
      window.open(clickTag, '_blank', 'noopener,noreferrer');
    });
  </script>
</body>
</html>
