<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="ad.size" content="width=728,height=90">
  <meta name="viewport" content="width=728,height=90">
  <title>How-To Geek — Deals Center 728×90 (light)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 728px; height: 90px; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #ad-root {
      width: 728px; height: 90px;
      position: relative;
      border: 1px solid #c8ced9;
      background: linear-gradient(105deg, #f4f6fa 0%, #e8ecf4 45%, #eef1f6 100%);
      overflow: hidden;
    }
    #ad-root::before {
      content: "";
      position: absolute; inset: -40%;
      background: radial-gradient(ellipse at 20% 50%, rgba(255, 106, 0, 0.06) 0%, transparent 55%),
                  radial-gradient(ellipse at 85% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      animation: bg-drift 8s ease-in-out infinite alternate;
    }
    @keyframes bg-drift { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(2%, -1%) rotate(1deg); } }
    a.exit {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; height: 100%; padding: 0 20px 0 24px;
      position: relative; z-index: 2;
      text-decoration: none; color: #1a1f2e; cursor: pointer;
    }
    .brand {
      font-weight: 800; font-size: 15px; letter-spacing: 0.02em;
      color: #1a1f2e; white-space: nowrap;
    }
    .brand span { color: #e85a00; }
    .copy {
      flex: 1; text-align: center; padding: 0 16px;
      font-size: 17px; font-weight: 600; line-height: 1.2;
      color: #3d4a5c;
    }
    .copy em {
      font-style: normal; color: #c73d00;
      background: linear-gradient(90deg, #c73d00, #e85a00, #c73d00);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 2.5s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }
    .cta {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 132px; height: 40px; padding: 0 18px;
      font-size: 14px; font-weight: 700; letter-spacing: 0.03em;
      color: #fff;
      background: linear-gradient(135deg, #ff6a22 0%, #c73d00 100%);
      border-radius: 6px;
      animation: cta-pulse 1.8s ease-in-out infinite;
    }
    @keyframes cta-pulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.12); }
    }
    @media (prefers-reduced-motion: reduce) {
      #ad-root::before, .copy em, .cta { animation: none !important; }
      .copy em { color: #c73d00; background: none; -webkit-background-clip: unset; background-clip: unset; }
    }
  </style>
</head>
<body>
  <div id="ad-root" role="img" aria-label="How-To Geek Deals Center — curated tech deals. Shop now.">
    <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer">
      <div class="brand">How-To Geek <span>Deals</span></div>
      <div class="copy">Editor-tested picks — <em>real savings</em> on gear you want</div>
      <span class="cta">Shop Deals Center</span>
    </a>
  </div>
  <script>
    var clickTag = 'https://www.howtogeek.com/deals/';
    document.getElementById('click').addEventListener('click', function (e) {
      e.preventDefault();
      window.open(clickTag, '_blank', 'noopener,noreferrer');
    });
  </script>
</body>
</html>
