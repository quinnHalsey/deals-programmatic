<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="ad.size" content="width=320,height=50" />
        <meta name="viewport" content="width=320,height=50" />
        <title>How-To Geek — Deals Center 320×50</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 320px;
                height: 50px;
                overflow: hidden;
            }
            #ad-root {
                position: relative;
                width: 320px;
                height: 50px;
                overflow: hidden;
                background: #e2e4e8;
                display: flex;
                align-items: stretch;
            }
            a.exit {
                position: absolute;
                inset: 0;
                z-index: 10;
                display: block;
                text-decoration: none;
                cursor: pointer;
            }
            a.exit:focus-visible {
                outline: 3px solid #f7941d;
                outline-offset: -3px;
            }

            /* ── Logo section ── */
            .logo-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding-left: 8px;
                padding-right: 6px;
                gap: 3px;
                flex: 0 0 auto;
                overflow: hidden;
            }
            .logo-img {
                display: block;
                width: 88px;
                height: auto;
                transform: translateX(-140px);
                opacity: 0;
                animation: slide-from-left 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.08s forwards;
            }
            .logo-tagline {
                font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                font-size: 16px;
                font-weight: 700;
                letter-spacing: 0.1em;
                color: #1a1f2e;
                text-transform: uppercase;
                transform: translateX(-140px);
                opacity: 0;
                animation: slide-from-left 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.22s forwards;
            }
            /* ── Products-area: product zone + text zone side by side ── */
            .products-area {
                flex: 1;
                display: flex;
                align-items: stretch;
                overflow: hidden;
            }

            /* ── Product zone (left column) ── */
            .product-zone {
                flex: 0 0 82px;
                position: relative;
                /* overflow: hidden; */
            }
            .products {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: flex-end;
                justify-content: center;
            }
            .products-2 .product-img,
            .products-3 .product-img {
                animation: none !important;
            }
            .products-2 .badge,
            .products-3 .badge {
                animation: none !important;
            }
            .product-slot {
                position: relative;
                width: 74px;
                height: 50px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
      
            .product-img {
                display: block;
                max-width: 54px;
                max-height: 44px;
                object-fit: contain;
                object-position: bottom center;
                transform: translateY(60px);
                opacity: 0;
                filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.75));
            }
            .products-1 .product-img {
                animation: slide-from-bottom 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
            }
            .products-1 .product-slot {
                right: -8px;
                align-items: flex-end;
            }

            /* ── Badges ── */
            .badge {
                position: absolute;
                bottom: 5px;
                right: -4px;
                background: #166534;
                color: #fff;
                font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 0.03em;
                padding: 3px 6px;
                border-radius: 999px;
                white-space: nowrap;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
                transform: scale(0);
                opacity: 0;
                transform-origin: center center;
            }
            
            .products-1 .badge {
                top: 12px;
                bottom: auto;
                left: 2px;
                right: auto;
                animation: pill-bounce-in 0.5s ease-out 0.65s forwards;
            }

            .products-3 .badge {
                bottom: 10px;
                left: -8px;
                right: auto;
                bottom: auto;
            }
       
            .products-3 .product-slot {
                right: -10px;
            }

            /* ── Text zone (right column) ── */
            .text-zone {
                flex: 1;
                position: relative;
                overflow: hidden;
            }
            .phase-3 .text-zone {
                overflow: visible;
            }
            .tagline-wrap,
            .tagline-wrap-2,
            .cta-wrap {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                padding-left: 10px;
                pointer-events: none;
            }
            .tagline {
                font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                font-size: 12.5px;
                font-weight: 300;
                color: #1a1f2e;
                line-height: 1.25;
                white-space: nowrap;
            }
            .tagline strong {
                font-weight: 800;
            }

            /* tagline 1 slides in from top on load */
            .tagline-wrap {
                transform: translateY(-22px);
                opacity: 0;
                animation: slide-from-top 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
            }
            .tagline-wrap .tagline strong {
                animation: text-fill-orange 0.5s ease-out 1.2s both;
            }

            /* tagline 2 + CTA hidden initially */
            .tagline-wrap-2 {
                transform: translateY(-22px);
                opacity: 0;
            }
            .cta-wrap {
                transform: translateY(-22px);
                opacity: 0;
                justify-content: center;
                padding-left: 0;
            }

            /* ── CTA button ── */
            .cta-btn {
                position: relative;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 8px 13px;
                border-radius: 4px;
                background: linear-gradient(135deg, #e95620, #c83c19);
                box-shadow: 0 2px 10px rgba(210, 70, 25, 0.4);
                font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.02em;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
            }
            .cta-btn::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 4px;
                background: linear-gradient(135deg, #c6491b 0%, #aa3315 100%);
                opacity: 0;
                transition: opacity 0.25s ease;
                pointer-events: none;
            }
            .cta-btn svg {
                position: relative;
                flex-shrink: 0;
                width: 13px;
                height: 13px;
                transition: transform 0.25s ease;
            }
            .cta-btn span {
                position: relative;
            }
            #ad-root:hover .cta-btn::before,
            #ad-root:focus-within .cta-btn::before {
                opacity: 1;
            }
            #ad-root.looping .cta-btn {
                animation: cta-shadow-pulse 1.1s ease-in-out infinite;
            }
            #ad-root.looping .cta-btn svg {
                animation: arrow-nudge 0.8s ease-in-out infinite;
            }
            #ad-root:hover .cta-btn,
            #ad-root:focus-within .cta-btn {
                animation: cta-shadow-pulse 1.1s ease-in-out infinite;
            }
            #ad-root:hover .cta-btn svg,
            #ad-root:focus-within .cta-btn svg {
                animation: arrow-nudge 0.8s ease-in-out infinite;
            }

            /* ── Keyframes ── */
            @keyframes slide-from-left {
                from { transform: translateX(-140px); opacity: 0; }
                to   { transform: translateX(0);      opacity: 1; }
            }
            @keyframes slide-from-bottom {
                from { transform: translateY(60px); opacity: 0; }
                to   { transform: translateY(0);    opacity: 1; }
            }
            @keyframes slide-to-top {
                from { transform: translateY(0);     opacity: 1; }
                to   { transform: translateY(-60px); opacity: 0; }
            }
            @keyframes slide-from-top {
                from { transform: translateY(-22px); opacity: 0; }
                to   { transform: translateY(0);     opacity: 1; }
            }
            @keyframes slide-to-bottom-exit {
                from { transform: translateY(0);    opacity: 1; }
                to   { transform: translateY(22px); opacity: 0; }
            }
            @keyframes pill-bounce-in {
                0%   { transform: scale(0);    opacity: 0; }
                12%  { opacity: 1; }
                68%  { transform: scale(1.12); }
                82%  { transform: scale(0.94); }
                94%  { transform: scale(1.03); }
                100% { transform: scale(1);    opacity: 1; }
            }
            @keyframes pill-shrink-out {
                from { transform: scale(1); opacity: 1; }
                to   { transform: scale(0); opacity: 0; }
            }
            @keyframes text-fill-orange {
                from { color: #1a1f2e; }
                to   { color: #c05620; }
           
            }
            @keyframes arrow-nudge {
                0%, 100% { transform: translateX(0); }
                50%       { transform: translateX(3px); }
            }
            @keyframes cta-shadow-pulse {
                0%, 100% {
                    box-shadow: 0 2px 10px rgba(192, 86, 32, 0.45), 0 0 0 0px rgba(192, 86, 32, 0);
                }
                50% {
                    box-shadow: 0 4px 18px rgba(192, 86, 32, 0.75), 0 0 0 3px rgba(192, 86, 32, 0.15);
                }
            }

            /* ── Phase 2: headset ↑ + router ↑ in | tagline 1 ↓ + tagline 2 ↓ in ── */
            .phase-2 .products-1 .badge {
                animation: pill-shrink-out 0.28s ease-in 0s both;
            }
            .phase-2 .products-1 .product-img {
                animation: slide-to-top 0.45s cubic-bezier(0.4, 0, 1, 1) 0.1s both;
            }
            .phase-2 .products-2 .product-img {
                animation: slide-from-bottom 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.38s both !important;
            }
            .phase-2 .products-2 .badge {
                animation: pill-bounce-in 0.5s ease-out 0.92s both !important;
            }
            .phase-2 .tagline-wrap {
                animation: slide-to-bottom-exit 0.38s cubic-bezier(0.4, 0, 1, 1) 0s both;
            }
            .phase-2 .tagline-wrap-2 {
                animation: slide-from-top 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.22s both;
            }
            .phase-2 .tagline-wrap-2 .tagline strong {
                animation: text-fill-orange 0.5s ease-out 1.1s both;
            }

            /* ── Phase 3: router ↑ + charger ↓ in | tagline 2 ↓ + CTA ↓ in ── */
            .phase-3 .products-2 .badge {
                animation: pill-shrink-out 0.28s ease-in 0s both !important;
            }
            .phase-3 .products-2 .product-img {
                animation: slide-to-top 0.45s cubic-bezier(0.4, 0, 1, 1) 0.1s both !important;
            }
            .phase-3 .products-3 .product-img {
                animation: slide-from-bottom 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.58s both !important;
            }
            .phase-3 .products-3 .badge {
                animation: pill-bounce-in 0.5s ease-out 1.12s both !important;
            }
            .phase-3 .tagline-wrap-2 {
                animation: slide-to-bottom-exit 0.38s cubic-bezier(0.4, 0, 1, 1) 0s both;
            }
            .phase-3 .cta-wrap {
                animation: slide-from-top 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
                pointer-events: auto;
            }

            /* ── Always light mode — better contrast with dark products ── */
            .logo-img--dark { display: none; }

            /* ── Reduced motion ── */
            @media (prefers-reduced-motion: reduce) {
                .logo-img,
                .logo-tagline {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
                /* Phase 1: show headset + tagline 1 immediately */
                .product-img {
                    animation: none !important;
                    transform: translateY(0) !important;
                    opacity: 1 !important;
                }
                .badge {
                    animation: none !important;
                    transform: scale(1) !important;
                    opacity: 1 !important;
                }
                .tagline-wrap {
                    animation: none !important;
                    transform: translateY(0) !important;
                    opacity: 1 !important;
                }
                .tagline-wrap .tagline strong {
                    animation: none !important;
                    color: #f7941d !important;
                }
                /* products-2 + products-3 hidden until their phases */
                .products-2 .product-img,
                .products-3 .product-img { opacity: 0 !important; }
                .products-2 .badge,
                .products-3 .badge       { opacity: 0 !important; }
                /* phase-2: headset gone, router + tagline 2 visible */
                .phase-2 .products-1 .product-img {
                    animation: none !important;
                    transform: translateY(-60px) !important;
                    opacity: 0 !important;
                }
                .phase-2 .products-1 .badge {
                    animation: none !important;
                    transform: scale(0) !important;
                    opacity: 0 !important;
                }
                .phase-2 .products-2 .product-img {
                    transform: translateY(0) !important;
                    opacity: 1 !important;
                }
                .phase-2 .products-2 .badge {
                    transform: scale(1) !important;
                    opacity: 1 !important;
                }
                .phase-2 .tagline-wrap {
                    animation: none !important;
                    transform: translateY(22px) !important;
                    opacity: 0 !important;
                }
                .phase-2 .tagline-wrap-2 {
                    animation: none !important;
                    transform: translateY(0) !important;
                    opacity: 1 !important;
                }
                .phase-2 .tagline-wrap-2 .tagline strong {
                    animation: none !important;
                    color: #f7941d !important;
                }
                /* phase-3: router gone, charger + CTA visible */
                .phase-3 .products-2 .product-img {
                    animation: none !important;
                    transform: translateY(-60px) !important;
                    opacity: 0 !important;
                }
                .phase-3 .products-2 .badge {
                    animation: none !important;
                    transform: scale(0) !important;
                    opacity: 0 !important;
                }
                .phase-3 .products-3 .product-img {
                    transform: translateY(0) !important;
                    opacity: 1 !important;
                }
                .phase-3 .products-3 .badge {
                    transform: scale(1) !important;
                    opacity: 1 !important;
                }
                .phase-3 .tagline-wrap-2 {
                    animation: none !important;
                    transform: translateY(22px) !important;
                    opacity: 0 !important;
                }
                .phase-3 .cta-wrap {
                    animation: none !important;
                    transform: translateY(0) !important;
                    opacity: 1 !important;
                }
                #ad-root.looping .cta-btn,
                #ad-root.looping .cta-btn svg {
                    animation: none !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="ad-root" role="region" aria-label="Advertisement: How-To Geek Deals Center">
            <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer" aria-label="Shop How-To Geek Deals — opens in new tab"></a>

            <!-- Logo -->
            <div class="logo-section">
                <img class="logo-img logo-img--dark" src="../assets/htg-logo.svg" alt="How-To Geek" width="88" height="15" decoding="async" />
                <img class="logo-img logo-img--light" src="../assets/htg-logo-dark.svg" alt="How-To Geek" width="88" height="15" decoding="async" />
                <span class="logo-tagline">Deals</span>
            </div>

            <div class="products-area">
                <!-- Left: product images -->
                <div class="product-zone">
                    <div class="products products-1">
                        <div class="product-slot">
                            <img class="product-img" src="../assets/razer-gaming-headset-sm.png" alt="" decoding="async" />
                            <div class="badge">-50%</div>
                        </div>
                    </div>
                    <div class="products products-2">
                        <div class="product-slot product-slot--router">
                            <img class="product-img" src="../assets/router-sm.png" alt="" decoding="async" loading="lazy" />
                            <div class="badge">-35%</div>
                        </div>
                    </div>
                    <div class="products products-3">
                        <div class="product-slot">
                            <img class="product-img" src="../assets/anker-charger-sm.png" alt="" decoding="async" loading="lazy" />
                            <div class="badge">-25%</div>
                        </div>
                    </div>
                </div>

                <!-- Right: taglines + CTA -->
                <div class="text-zone">

                    <!-- Phase 1: headset tagline -->
                    <div class="tagline-wrap" aria-hidden="true">
                        <p class="tagline">Level up for <strong>50% off</strong>.</p>
                    </div>

                    <!-- Phase 2: router tagline -->
                    <div class="tagline-wrap-2" aria-hidden="true">
                        <p class="tagline">Fast Wi-Fi, <strong>35% off</strong>.</p>
                    </div>

                    <!-- Phase 3: CTA -->
                    <div class="cta-wrap" aria-hidden="true">
                        <div class="cta-btn">
                            <span>Explore Deals</span>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M5 12h14M13 6l6 6-6 6" />
                            </svg>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <script>
            var clickTag = 'https://www.howtogeek.com/deals/';
            document.getElementById('click').addEventListener('click', function (e) {
                e.preventDefault();
                window.open(clickTag, '_blank', 'noopener,noreferrer');
            });

            // phase-2: headset ↑ + router enters | tagline 1 ↓ + tagline 2 enters
            setTimeout(function () {
                document.getElementById('ad-root').classList.add('phase-2');
            }, 3000);

            // phase-3: router ↑ + charger enters | tagline 2 ↓ + CTA enters
            setTimeout(function () {
                document.getElementById('ad-root').classList.add('phase-3');
            }, 6000);

            // looping: CTA pulses + arrow nudges
            setTimeout(function () {
                document.getElementById('ad-root').classList.add('looping');
            }, 8000);
        </script>
    </body>
</html>
