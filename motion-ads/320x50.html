<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="ad.size" content="width=320,height=50" />
        <meta name="viewport" content="width=320,height=50" />
        <title>How-To Geek — Deals Center 320×50</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 320px;
                height: 50px;
                overflow: hidden;
            }
            #ad-root {
                position: relative;
                width: 320px;
                height: 50px;
                overflow: hidden;
                background: #202020;
                display: flex;
                align-items: stretch;
            }
            a.exit {
                position: absolute;
                inset: 0;
                z-index: 10;
                display: block;
                text-decoration: none;
                cursor: pointer;
            }
            a.exit:focus-visible {
                outline: 3px solid #f7941d;
                outline-offset: -3px;
            }

            /* ── Logo section ── */
            .logo-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding-left: 8px;
                gap: 3px;
                flex: 0 0 auto;
                overflow: hidden;
            }
            .logo-img {
                display: block;
                width: 88px;
                height: auto;
                transform: translateX(-140px);
                opacity: 0;
                animation: slide-from-left 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.08s forwards;
            }
            .logo-tagline {
                font-family: 'Roboto', system-ui, sans-serif;
                font-size: 8px;
                font-weight: 700;
                letter-spacing: 0.18em;
                color: #f7941d;
                text-transform: uppercase;
                transform: translateX(-140px);
                opacity: 0;
                animation: slide-from-left 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.22s forwards;
            }

            /* ── Keyframes ── */
            @keyframes slide-from-left {
                from { transform: translateX(-140px); opacity: 0; }
                to   { transform: translateX(0);      opacity: 1; }
            }

            /* ── Light mode ── */
            .logo-img--light { display: none; }
            body.light-mode #ad-root { background: #e2e4e8; }
            body.light-mode .logo-img--dark { display: none; }
            body.light-mode .logo-img--light { display: block; }

            /* ── Reduced motion ── */
            @media (prefers-reduced-motion: reduce) {
                .logo-img,
                .logo-tagline {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="ad-root" role="region" aria-label="Advertisement: How-To Geek Deals Center">
            <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer" aria-label="Shop How-To Geek Deals — opens in new tab"></a>

            <!-- Logo -->
            <div class="logo-section">
                <img class="logo-img logo-img--dark" src="../assets/htg-logo.svg" alt="How-To Geek" width="88" height="15" decoding="async" />
                <img class="logo-img logo-img--light" src="../assets/htg-logo-dark.svg" alt="How-To Geek" width="88" height="15" decoding="async" />
                <span class="logo-tagline">Deals Center</span>
            </div>
        </div>

        <script>
            if (/[?&]light/.test(location.search)) document.body.classList.add('light-mode');
        </script>
        <script>
            var clickTag = 'https://www.howtogeek.com/deals/';
            document.getElementById('click').addEventListener('click', function (e) {
                e.preventDefault();
                window.open(clickTag, '_blank', 'noopener,noreferrer');
            });
        </script>
    </body>
</html>
