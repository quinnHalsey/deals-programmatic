<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="ad.size" content="width=950,height=250" />
        <meta name="viewport" content="width=950,height=250" />
        <title>How-To Geek — Deals hero 950×250 circle reveal</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 950px;
                height: 250px;
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: #101010;
            }
            #ad-root {
                position: relative;
                width: 950px;
                height: 250px;
                overflow: hidden;
                background: #101010;
            }
            /* Wider world so right stage starts off-canvas; camera = translateX pan */
            .pan-layer {
                position: absolute;
                left: 0;
                top: 0;
                width: 1480px;
                height: 250px;
                z-index: 0;
                will-change: transform;
                animation:
                    camera-pan 0.95s cubic-bezier(0.33, 0.06, 0.13, 1) 4s forwards,
                    camera-pan-back 0.95s cubic-bezier(0.33, 0.06, 0.13, 1) 8.52s forwards;
            }
            @keyframes camera-pan {
                from {
                    transform: translateX(0);
                }
                to {
                    /* Left disc right edge = 376px in pan space; need < 0 on screen */
                    transform: translateX(-392px);
                }
            }
            @keyframes camera-pan-back {
                from {
                    transform: translateX(-392px);
                }
                to {
                    transform: translateX(0);
                }
            }
            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border: 0;
            }
            a.exit {
                position: absolute;
                inset: 0;
                z-index: 10;
                display: block;
                text-decoration: none;
                color: inherit;
                cursor: pointer;
            }
            a.exit:focus-visible {
                outline: 3px solid #f7941d;
                outline-offset: -3px;
            }
            .stage {
                width: 442px;
                height: 442px;
                position: absolute;
                overflow: hidden;
                z-index: 0;
                top: -100px;
            }
            /* Match original -7% of 950 ≈ -66px ring anchor from left */
            .stage--left {
                left: -66px;
                animation: stage-exit-left 0.85s cubic-bezier(0.33, 0.06, 0.13, 1) 4s forwards;
            }
            @keyframes stage-exit-left {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(-120px);
                    opacity: 0.85;
                }
            }
            /* Fully past 950 until pan; ring center ~797px in frame after pan */
            .stage--right {
                left: 968px;
                z-index: 1;
                opacity: 1;
                animation:
                    stage-enter-right 0.85s cubic-bezier(0.33, 0.06, 0.13, 1) 4s both,
                    stage-exit-right 0.85s cubic-bezier(0.33, 0.06, 0.13, 1) 8.52s forwards;
            }
            @keyframes stage-enter-right {
                from {
                    transform: translateX(120px);
                    opacity: 0.85;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes stage-exit-right {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(120px);
                    opacity: 0.85;
                }
            }
            /* Rings centered on left edge (x = 0); 10px stroke between rings */
            .disc {
                position: absolute;
                left: 50%;
                top: 50%;
                border-radius: 50%;
                transform: translate(-50%, -50%) scale(0);
                transform-origin: center center;
                will-change: transform;
            }
            .disc--orange {
                z-index: 1;
                width: 442px;
                height: 442px;
                background: #f7941d;
                animation:
                    expand 0.9s cubic-bezier(0.22, 1, 0.32, 1) forwards,
                    expand 0.92s cubic-bezier(0.22, 1, 0.32, 1) 4.28s reverse forwards;
            }
            .disc--gray {
                z-index: 2;
                width: 422px;
                height: 422px;
                background: #d9d9d9;
                animation:
                    expand 0.88s cubic-bezier(0.22, 1, 0.32, 1) 0.14s forwards,
                    expand 0.88s cubic-bezier(0.22, 1, 0.32, 1) 4.14s reverse forwards;
            }
            .disc--photo {
                z-index: 3;
                width: 402px;
                height: 402px;
                overflow: hidden;
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
                animation:
                    expand 0.92s cubic-bezier(0.22, 1, 0.32, 1) 0.32s forwards,
                    expand 0.9s cubic-bezier(0.22, 1, 0.32, 1) 4s reverse forwards;
            }
            /* Second product: same expand curve, starts as camera pans; collapse mirrors left stagger */
            .stage--right .disc--orange {
                animation:
                    expand 0.9s cubic-bezier(0.22, 1, 0.32, 1) 4.54s forwards,
                    expand 0.92s cubic-bezier(0.22, 1, 0.32, 1) 8.80s reverse forwards;
            }
            .stage--right .disc--gray {
                animation:
                    expand 0.88s cubic-bezier(0.22, 1, 0.32, 1) 4.68s forwards,
                    expand 0.88s cubic-bezier(0.22, 1, 0.32, 1) 8.66s reverse forwards;
            }
            .stage--right .disc--photo {
                animation:
                    expand 0.92s cubic-bezier(0.22, 1, 0.32, 1) 4.86s forwards,
                    expand 0.9s cubic-bezier(0.22, 1, 0.32, 1) 8.52s reverse forwards;
            }

            .disc--photo img {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center;
            }
            @keyframes expand {
                from {
                    transform: translate(-50%, -50%) scale(0);
                }
                to {
                    transform: translate(-50%, -50%) scale(1);
                }
            }
            .pill-off {
                position: absolute;
                top: 40px;
                z-index: 4;
                transform: scale(0);
                transform-origin: 38% 50%;
                padding: 8px 18px;
                border-radius: 999px;
                background: #166534;
                box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
                font-family: 'Roboto', system-ui, sans-serif;
                font-size: 17px;
                font-weight: 700;
                line-height: 1;
                letter-spacing: 0.04em;
                color: #fff;
                white-space: nowrap;
                pointer-events: none;
                opacity: 0;
            }
            .pill-off--left {
                left: 310px;
                transform-origin: 38% 50%;
                animation:
                    pill-bounce-in 0.52s ease-out 0.8s forwards,
                    pill-bounce-in 0.52s ease-in 4s reverse forwards;
            }
            /* Same 66px inset from inward disc edge as left (376−310 = 66; 968−66) */
            .pill-off--right {
                left: 920px;
                transform-origin: 62% 50%;
                background: #14532d;
                animation:
                    pill-bounce-in 0.52s ease-out 5.32s forwards,
                    pill-bounce-in 0.52s ease-in 8.62s reverse forwards;
            }
            @keyframes pill-bounce-in {
                0% {
                    transform: scale(0);
                    opacity: 0;
                }
                12% {
                    opacity: 1;
                }
                68% {
                    transform: scale(1.08);
                }
                82% {
                    transform: scale(0.94);
                }
                94% {
                    transform: scale(1.02);
                }
                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }
            /* Right column: logo → headline → sub → CTA; sync with ring expand (t=0) */
            .hero-panel {
                position: absolute;
                z-index: 5;
                left: 402px;
                width: 548px;
                right: auto;
                top: 0;
                bottom: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 14px;
                padding: 20px 28px 22px 16px;
                pointer-events: none;
                text-align: center;
            }
            .hero-panel-title {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }
            .hero-logo {
                display: block;
                width: 300px;
                height: 50px;
                object-fit: contain;
            }
            .hero-title {
                font-family: 'Roboto', system-ui, sans-serif;
                font-size: 24px;
                font-weight: 700;
                line-height: 1.05;
                letter-spacing: 0.15em;
                color: #f7941d;
                text-transform: uppercase;
            }
            .hero-sub {
                font-family: 'Roboto', system-ui, sans-serif;
                font-size: 20px;
                font-weight: 400;
                line-height: 1.45;
                color: #fff;
            }
            .hero-cta {
                position: relative;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                margin-top: 4px;
                padding: 11px 22px 11px 24px;
                border-radius: 4px;
                background: linear-gradient(135deg, #e95620, #c83c19);
                box-shadow: 0 4px 18px rgba(210, 70, 25, 0.4);
                font-family: 'Roboto', system-ui, sans-serif;
                font-size: 15px;
                font-weight: 700;
                letter-spacing: 0.02em;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
            }
            /* Gradient overlay — fade in/out via opacity so transition never touches gradient↔solid */
            .hero-cta::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 4px;
                background: linear-gradient(135deg, #c6491b 0%, #aa3315 100%);
                opacity: 0;
                transition: opacity 0.25s ease;
                pointer-events: none;
            }
            .hero-cta svg {
                position: relative;
                flex-shrink: 0;
                width: 18px;
                height: 18px;
                transition: transform 0.25s ease;
            }
            .hero-cta span {
                position: relative;
            }
            /* Hover: entire ad frame triggers CTA state */
            #ad-root:hover .hero-cta::before, #ad-root:focus-within .hero-cta::before {
                opacity: 1;
            }
            #ad-root:hover .hero-cta, #ad-root:focus-within .hero-cta {
                animation: cta-shadow-pulse 1.1s ease-in-out infinite;
            }
            #ad-root:hover .hero-cta svg, #ad-root:focus-within .hero-cta svg {
                animation: arrow-nudge 0.85s ease-in-out infinite;
            }
            @keyframes arrow-nudge {
                0%, 100% {
                    transform: translateX(0);
                }
                50% {
                    transform: translateX(5px);
                }
            }
            @keyframes cta-shadow-pulse {
                0%, 100% {
                    box-shadow:
                        0 4px 18px rgba(192, 86, 32, 0.45),
                        0 0 0 0px rgba(192, 86, 32, 0);
                }
                50% {
                    box-shadow:
                        0 6px 28px rgba(192, 86, 32, 0.75),
                        0 0 0 5px rgba(192, 86, 32, 0.15);
                }
            }
            @media (prefers-reduced-motion: reduce) {
                .pan-layer {
                    animation: none !important;
                    transform: translateX(-392px) !important;
                }
                .stage--left,
                .stage--right {
                    animation: none !important;
                    transform: none !important;
                    opacity: 1 !important;
                }
                .disc {
                    animation: none !important;
                    transform: translate(-50%, -50%) scale(1) !important;
                }
                .pill-off {
                    animation: none !important;
                    transform: scale(1) !important;
                    opacity: 1 !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="ad-root" role="region" aria-label="Advertisement: How-To Geek Deals Center">
            <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer" aria-label="Shop How-To Geek Deals — opens in new tab"></a>
            <div class="pan-layer">
                <p class="sr-only">Mobile power bank, 25% off. MacBook Air, save $150.</p>
                <div class="stage stage--left" aria-hidden="true">
                    <div class="disc disc--orange"></div>
                    <div class="disc disc--gray"></div>
                    <div class="disc disc--photo">
                        <img alt="" width="210" height="210" decoding="async" src="https://static0.howtogeekimages.com/wordpress/wp-content/uploads/2026/05/baseus-picogo-am52-magsafe-power-bank-edited.jpg?q=49&amp;fit=crop&amp;w=400&amp;dpr=2" />
                    </div>
                </div>
                <div class="pill-off pill-off--left" aria-hidden="true">25% OFF</div>
                <div class="stage stage--right" aria-hidden="true">
                    <div class="disc disc--orange"></div>
                    <div class="disc disc--gray"></div>
                    <div class="disc disc--photo">
                        <img alt="" width="210" height="210" decoding="async" src="https://static0.howtogeekimages.com/wordpress/wp-content/uploads/2025/06/m4-macbook-air-getting-put-into-a-bag.jpg?q=49&amp;fit=crop&amp;w=380&amp;dpr=2" />
                    </div>
                  </div>
                  <div class="pill-off pill-off--right" aria-hidden="true">SAVE $150</div>
                <div class="hero-panel">
                    <div class="hero-panel-title">
                        <img class="hero-logo" src="../assets/htg-logo.svg" alt="How-To Geek" width="248" height="42" decoding="async" />
                        <p class="hero-title">Deals Center</p>
                    </div>
                    <p class="hero-sub">Deals worth your time. Curated by our editors.</p>
                    <div class="hero-cta" aria-hidden="true">
                        <span>Shop All Deals</span>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M5 12h14M13 6l6 6-6 6" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        <script>
            var clickTag = 'https://www.howtogeek.com/deals/';
            document.getElementById('click').addEventListener('click', function (e) {
                e.preventDefault();
                window.open(clickTag, '_blank', 'noopener,noreferrer');
            });
            // TODO: check if JS for loop is allowed
            (function () {
                var LOOP_MS = 9800;
                var root = document.getElementById('ad-root');
                var els = root.querySelectorAll('.pan-layer, .stage--left, .stage--right, .disc, .pill-off');
                function loopAd() {
                    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                    els.forEach(function (el) { el.style.animation = 'none'; });
                    void root.offsetWidth;
                    els.forEach(function (el) { el.style.animation = ''; });
                    setTimeout(loopAd, LOOP_MS);
                }
                if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    setTimeout(loopAd, LOOP_MS);
                }
            }());
        </script>
    </body>
</html>
