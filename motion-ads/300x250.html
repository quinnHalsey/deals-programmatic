<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="ad.size" content="width=300,height=250" />
        <meta name="viewport" content="width=300,height=250" />
        <title>How-To Geek — Deals Center 300×250</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 300px;
                height: 250px;
                overflow: hidden;
            }
            #ad-root {
                position: relative;
                width: 300px;
                height: 250px;
                overflow: hidden;
                background: #202020;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            a.exit {
                position: absolute;
                inset: 0;
                z-index: 10;
                display: block;
                text-decoration: none;
                cursor: pointer;
            }
            a.exit:focus-visible {
                outline: 3px solid #f7941d;
                outline-offset: -3px;
            }

            /* ── Header ── */
            .header {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding-top: 12px;
                padding-bottom: 6px;
                gap: 4px;
                flex: 0 0 auto;
                z-index: 1;
            }
            .logo-img {
                display: block;
                width: 148px;
                height: auto;
                transform: translateY(-30px);
                opacity: 0;
                animation: slide-from-top 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.08s forwards;
            }
            .deals-label {
                font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                font-size: 14px;
                line-height: 1;
                font-weight: 700;
                letter-spacing: 0.26em;
                color: #f7941d;
                text-transform: uppercase;
                transform: translateY(-16px);
                opacity: 0;
                animation: slide-from-top 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.24s forwards;
            }
            .divider {
                width: 32px;
                height: 2px;
                background: rgba(247, 148, 29, 0.55);
                border-radius: 2px;
                margin-top: 1px;
                transform: scaleX(0);
                opacity: 0;
                transform-origin: center;
                animation: divider-in 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.52s forwards;
            }

            /* ── Product zone (2 products, side by side, centered) ── */
            .product-zone {
                flex: 1;
                position: relative;
                width: 100%;
                min-height: 0;
                overflow: hidden;
            }
            .products {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 18px;
                padding: 6px 20px 12px;
            }
            .products-2 {
                pointer-events: none;
            }
            .products-2 .product-img,
            .products-2 .badge {
                animation: none !important;
            }
            .product-slot {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                flex: 0 0 110px;
                width: 110px;
                height: 100%;
            }
            .product-slot--cam .badge {
                right: auto;
                left: -10px;
            }
            .product-slot--sm .product-img {
                max-width: 80px;
                max-height: 76px;
            }
            .product-img {
                display: block;
                max-width: 100px;
                max-height: 96px;
                object-fit: contain;
                object-position: center center;
                transform: translateX(-320px);
                opacity: 0;
                filter: drop-shadow(2px 2px 3px rgba(0, 0, 0, 0.65));
            }
            /* Phase 1: both products enter from left simultaneously */
            .products-1 .product-slot:nth-child(1) .product-img {
                animation: slide-from-left 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.56s forwards;
            }
            .products-1 .product-slot:nth-child(2) .product-img {
                animation: slide-from-left 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.68s forwards;
            }

            /* ── Badges ── */
            .badge {
                position: absolute;
                bottom: 8px;
                right: 0px;
                background: #166534;
                color: #fff;
                font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.03em;
                padding: 3px 8px;
                border-radius: 999px;
                white-space: nowrap;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
                transform: scale(0);
                opacity: 0;
                transform-origin: center center;
            }
            .products-1 .product-slot:nth-child(1) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.1s forwards;
            }
            .products-1 .product-slot:nth-child(2) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.24s forwards;
            }

            /* ── Tagline area (below product zone, above CTA) ── */
            .tagline-area {
                flex: 0 0 auto;
                position: relative;
                width: 100%;
                height: 30px;
                overflow: hidden;
                z-index: 1;
            }
            .tagline-wrap,
            .tagline-wrap-2 {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0 20px;
                pointer-events: none;
            }
            .tagline {
                font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                font-size: 14px;
                font-weight: 400;
                color: #fff;
                line-height: 1.3;
                text-align: center;
                white-space: nowrap;
            }
            .tagline strong {
                font-weight: 700;
            }
            /* tagline 1 slides in from right — simultaneous with products-1 */
            .tagline-wrap {
                transform: translateX(320px);
                opacity: 0;
                animation: slide-from-right 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.56s forwards;
            }
            .tagline-wrap .tagline strong {
                animation: text-fill-orange 0.5s ease-out 1.3s both;
            }
            /* tagline 2 hidden initially */
            .tagline-wrap-2 {
                transform: translateX(320px);
                opacity: 0;
            }

            /* ── CTA ── */
            .cta-wrap {
                flex: 0 0 auto;
                padding: 6px 20px 14px;
                z-index: 1;
                width: 100%;
            }
            .cta-btn {
                width: 100%;
                position: relative;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                padding: 10px 20px;
                border-radius: 4px;
                background: linear-gradient(135deg, #e95620, #c83c19);
                box-shadow: 0 4px 16px rgba(210, 70, 25, 0.4);
                font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                font-size: 13px;
                font-weight: 700;
                letter-spacing: 0.02em;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
            }
            .cta-btn::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 4px;
                background: linear-gradient(135deg, #c6491b 0%, #aa3315 100%);
                opacity: 0;
                transition: opacity 0.25s ease;
                pointer-events: none;
            }
            .cta-btn svg {
                position: relative;
                flex-shrink: 0;
                width: 14px;
                height: 14px;
                transition: transform 0.25s ease;
            }
            .cta-btn span {
                position: relative;
            }
            #ad-root:hover .cta-btn::before,
            #ad-root:focus-within .cta-btn::before {
                opacity: 1;
            }
            #ad-root.looping .cta-btn {
                animation: cta-shadow-pulse 1.1s ease-in-out infinite;
            }
            #ad-root.looping .cta-btn svg {
                animation: arrow-nudge 0.8s ease-in-out infinite;
            }
            #ad-root:hover .cta-btn,
            #ad-root:focus-within .cta-btn {
                animation: cta-shadow-pulse 1.1s ease-in-out infinite;
            }
            #ad-root:hover .cta-btn svg,
            #ad-root:focus-within .cta-btn svg {
                animation: arrow-nudge 0.8s ease-in-out infinite;
            }

            /* ── Keyframes ── */
            @keyframes slide-from-top {
                from { transform: translateY(-30px); opacity: 0; }
                to   { transform: translateY(0);     opacity: 1; }
            }
            @keyframes divider-in {
                from { transform: scaleX(0); opacity: 0; }
                to   { transform: scaleX(1); opacity: 1; }
            }
            @keyframes slide-from-left {
                from { transform: translateX(-320px); opacity: 0; }
                to   { transform: translateX(0);      opacity: 1; }
            }
            @keyframes slide-to-right {
                from { transform: translateX(0);     opacity: 1; }
                to   { transform: translateX(320px); opacity: 0; }
            }
            @keyframes slide-from-right {
                from { transform: translateX(320px); opacity: 0; }
                to   { transform: translateX(0);     opacity: 1; }
            }
            @keyframes slide-to-left {
                from { transform: translateX(0);      opacity: 1; }
                to   { transform: translateX(-320px); opacity: 0; }
            }
            @keyframes pill-bounce-in {
                0%   { transform: scale(0);    opacity: 0; }
                12%  { opacity: 1; }
                68%  { transform: scale(1.12); }
                82%  { transform: scale(0.94); }
                94%  { transform: scale(1.03); }
                100% { transform: scale(1);    opacity: 1; }
            }
            @keyframes pill-shrink-out {
                from { transform: scale(1); opacity: 1; }
                to   { transform: scale(0); opacity: 0; }
            }
            @keyframes text-fill-orange {
                from { color: #fff; }
                to   { color: #f7941d; }
            }
            @keyframes arrow-nudge {
                0%, 100% { transform: translateX(0); }
                50%       { transform: translateX(4px); }
            }
            @keyframes cta-shadow-pulse {
                0%, 100% {
                    box-shadow: 0 4px 16px rgba(192, 86, 32, 0.45), 0 0 0 0px rgba(192, 86, 32, 0);
                }
                50% {
                    box-shadow: 0 6px 26px rgba(192, 86, 32, 0.75), 0 0 0 4px rgba(192, 86, 32, 0.15);
                }
            }

            /* ── Phase 2: products-1 exit right + tagline-1 exit left (simultaneous)
                          → products-2 enter left + tagline-2 enter right (simultaneous) ── */
            .phase-2 .products-1 .product-slot:nth-child(1) .badge,
            .phase-2 .products-1 .product-slot:nth-child(2) .badge {
                animation: pill-shrink-out 0.22s ease-in 0s both;
            }
            /* products and tagline exit at the same time */
            .phase-2 .products-1 .product-slot:nth-child(1) .product-img,
            .phase-2 .products-1 .product-slot:nth-child(2) .product-img {
                animation: slide-to-right 0.45s cubic-bezier(0.4, 0, 1, 1) 0.1s both;
            }
            .phase-2 .tagline-wrap {
                animation: slide-to-left 0.45s cubic-bezier(0.4, 0, 1, 1) 0.1s both;
            }
            /* products-2 and tagline-2 enter at the same time */
            .phase-2 .products-2 .product-slot:nth-child(1) .product-img {
                animation: slide-from-left 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.52s both !important;
            }
            .phase-2 .products-2 .product-slot:nth-child(2) .product-img {
                animation: slide-from-left 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.64s both !important;
            }
            .phase-2 .products-2 .product-slot:nth-child(1) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.06s both !important;
            }
            .phase-2 .products-2 .product-slot:nth-child(2) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.2s both !important;
            }
            .phase-2 .tagline-wrap-2 {
                animation: slide-from-right 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.52s both;
            }
            .phase-2 .tagline-wrap-2 .tagline strong {
                animation: text-fill-orange 0.5s ease-out 1.3s both;
            }

            /* ── Phase 3: products-2 exit right + tagline-2 exit left (simultaneous)
                          → products-1 re-enter left + tagline-1 re-enter right (simultaneous) ── */
            .phase-3 .products-2 .product-slot:nth-child(1) .badge,
            .phase-3 .products-2 .product-slot:nth-child(2) .badge {
                animation: pill-shrink-out 0.22s ease-in 0s both !important;
            }
            .phase-3 .products-2 .product-slot:nth-child(1) .product-img,
            .phase-3 .products-2 .product-slot:nth-child(2) .product-img {
                animation: slide-to-right 0.45s cubic-bezier(0.4, 0, 1, 1) 0.1s both !important;
            }
            .phase-3 .tagline-wrap-2 {
                animation: slide-to-left 0.45s cubic-bezier(0.4, 0, 1, 1) 0.1s both !important;
            }
            .phase-3 .products-1 .product-slot:nth-child(1) .product-img {
                animation: slide-from-left 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.52s both !important;
            }
            .phase-3 .products-1 .product-slot:nth-child(2) .product-img {
                animation: slide-from-left 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.64s both !important;
            }
            .phase-3 .products-1 .product-slot:nth-child(1) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.06s both !important;
            }
            .phase-3 .products-1 .product-slot:nth-child(2) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.2s both !important;
            }
            .phase-3 .tagline-wrap {
                animation: slide-from-right 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.52s both !important;
            }
            .phase-3 .tagline-wrap .tagline strong {
                animation: text-fill-orange 0.5s ease-out 1.3s both !important;
            }

            /* ── Light mode ── */
            .logo-img--light { display: none; }
            body.light-mode #ad-root {
                background: #e2e4e8;
            }
            body.light-mode .tagline {
                color: #1a1f2e;
            }
            body.light-mode .logo-img--dark { display: none; }
            body.light-mode .logo-img--light { display: block; }
            @keyframes text-fill-orange-light {
                from { color: #1a1f2e; }
                to   { color: #f7941d; }
            }
            body.light-mode .tagline-wrap .tagline strong,
            body.light-mode .phase-2 .tagline-wrap-2 .tagline strong,
            body.light-mode .phase-3 .tagline-wrap .tagline strong {
                animation-name: text-fill-orange-light !important;
            }

            /* ── XDA mode ── */
            .logo-img--xda { display: none; }
            body.xda-mode .logo-img--dark,
            body.xda-mode .logo-img--light { display: none; }
            body.xda-mode .logo-img--xda { display: block; width: 120px; }
            body.xda-mode a.exit:focus-visible { outline-color: #a601c8; }
            body.xda-mode .deals-label { color: #a601c8; }
            body.xda-mode .divider { background: rgba(166, 1, 200, 0.55); }
            body.xda-mode .cta-btn {
                background: linear-gradient(135deg, #a601c8, #7800a0);
                box-shadow: 0 4px 16px rgba(166, 1, 200, 0.4);
            }
            body.xda-mode .cta-btn::before {
                background: linear-gradient(135deg, #8a00a8 0%, #640090 100%);
            }
            @keyframes text-fill-xda {
                from { color: #fff; }
                to   { color: #a601c8; }
            }
            body.xda-mode .tagline-wrap .tagline strong,
            body.xda-mode .phase-2 .tagline-wrap-2 .tagline strong,
            body.xda-mode .phase-3 .tagline-wrap .tagline strong {
                animation-name: text-fill-xda;
            }
            @keyframes cta-shadow-pulse-xda {
                0%, 100% { box-shadow: 0 4px 16px rgba(166, 1, 200, 0.45), 0 0 0 0px rgba(166, 1, 200, 0); }
                50%       { box-shadow: 0 6px 26px rgba(166, 1, 200, 0.75), 0 0 0 4px rgba(166, 1, 200, 0.15); }
            }
            body.xda-mode #ad-root.looping .cta-btn,
            body.xda-mode #ad-root:hover .cta-btn,
            body.xda-mode #ad-root:focus-within .cta-btn { animation-name: cta-shadow-pulse-xda; }

            /* ── Between-cycle idle: freeze products-1 + tagline-1 in place so loop is seamless ── */
            .phase-idle .tagline-wrap {
                animation: none !important;
                transform: translateX(0) !important;
                opacity: 1 !important;
            }
            .phase-idle .tagline-wrap .tagline strong {
                animation: none !important;
                color: #f7941d !important;
            }
            .phase-idle .products-1 .product-slot:nth-child(1) .product-img,
            .phase-idle .products-1 .product-slot:nth-child(2) .product-img {
                animation: none !important;
                transform: translateX(0) !important;
                opacity: 1 !important;
            }
            .phase-idle .products-1 .product-slot:nth-child(1) .badge,
            .phase-idle .products-1 .product-slot:nth-child(2) .badge {
                animation: none !important;
                transform: scale(1) !important;
                opacity: 1 !important;
            }

            /* ── Reduced motion ── */
            @media (prefers-reduced-motion: reduce) {
                .logo-img,
                .deals-label,
                .divider {
                    animation: none !important;
                    transform: none !important;
                    opacity: 1 !important;
                }
                .product-img {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
                .badge {
                    animation: none !important;
                    transform: scale(1) !important;
                    opacity: 1 !important;
                }
                .products-2 .product-img { opacity: 0 !important; }
                .products-2 .badge       { opacity: 0 !important; }
                .tagline-wrap {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
                .tagline-wrap .tagline strong {
                    animation: none !important;
                    color: #f7941d !important;
                }
                .tagline-wrap-2 { opacity: 0 !important; }
                /* phase-2 */
                .phase-2 .products-1 .product-slot:nth-child(1) .product-img,
                .phase-2 .products-1 .product-slot:nth-child(2) .product-img {
                    animation: none !important;
                    transform: translateX(320px) !important;
                    opacity: 0 !important;
                }
                .phase-2 .products-1 .badge {
                    animation: none !important;
                    transform: scale(0) !important;
                    opacity: 0 !important;
                }
                .phase-2 .products-2 .product-img {
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
                .phase-2 .products-2 .badge {
                    transform: scale(1) !important;
                    opacity: 1 !important;
                }
                .phase-2 .tagline-wrap {
                    animation: none !important;
                    transform: translateX(-320px) !important;
                    opacity: 0 !important;
                }
                .phase-2 .tagline-wrap-2 {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
                .phase-2 .tagline-wrap-2 .tagline strong {
                    animation: none !important;
                    color: #f7941d !important;
                }
                /* phase-3: products-2 hidden, products-1 visible, tagline-1 visible */
                .phase-3 .products-2 .product-img {
                    animation: none !important;
                    transform: translateX(320px) !important;
                    opacity: 0 !important;
                }
                .phase-3 .products-2 .badge {
                    animation: none !important;
                    transform: scale(0) !important;
                    opacity: 0 !important;
                }
                .phase-3 .products-1 .product-img {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
                .phase-3 .products-1 .badge {
                    animation: none !important;
                    transform: scale(1) !important;
                    opacity: 1 !important;
                }
                .phase-3 .tagline-wrap-2 {
                    animation: none !important;
                    opacity: 0 !important;
                }
                .phase-3 .tagline-wrap {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
                .phase-3 .tagline-wrap .tagline strong {
                    animation: none !important;
                    color: #f7941d !important;
                }
                #ad-root.looping .cta-btn,
                #ad-root.looping .cta-btn svg {
                    animation: none !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="ad-root" role="region" aria-label="Advertisement: How-To Geek Deals Center">
            <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer" aria-label="Shop How-To Geek Deals — opens in new tab"></a>

            <!-- Header -->
            <div class="header">
                <img class="logo-img logo-img--dark" src="../assets/htg-logo.svg" alt="How-To Geek" width="148" height="25" decoding="async" />
                <img class="logo-img logo-img--light" src="../assets/htg-logo-dark.svg" alt="How-To Geek" width="148" height="25" decoding="async" />
                <img class="logo-img logo-img--xda" src="../assets/xda-logo-full-colored-light.svg" alt="XDA Developers" width="120" height="35" decoding="async" />
                <span class="deals-label">Deals Center</span>
                <div class="divider" aria-hidden="true"></div>
            </div>

            <!-- Products (2 at a time, centered) -->
            <div class="product-zone">
                <div class="products products-1">
                    <div class="product-slot product-slot--cam">
                        <img class="product-img" src="../assets/sony-vlog-camera.png" alt="Sony vlog camera" decoding="async" />
                        <div class="badge">-$152</div>
                    </div>
                    <div class="product-slot">
                        <img class="product-img" src="../assets/razer-gaming-headset.png" alt="Razer gaming headset" decoding="async" />
                        <div class="badge">-50%</div>
                    </div>
                </div>
                <div class="products products-2">
                    <div class="product-slot">
                        <img class="product-img" src="../assets/router.png" alt="Wi-Fi router" loading="lazy" decoding="async" />
                        <div class="badge">-35%</div>
                    </div>
                    <div class="product-slot product-slot--sm">
                        <img class="product-img" src="../assets/sony-wh-1000-xm5-headphones.png" alt="Sony WH-1000XM5 wireless headphones" loading="lazy" decoding="async" />
                        <div class="badge">-$122</div>
                    </div>
                </div>
            </div>

            <!-- Tagline (below products, above CTA) -->
            <div class="tagline-area">
                <div class="tagline-wrap" aria-hidden="true">
                    <p class="tagline">Up to <strong>50% off</strong> curated tech.</p>
                </div>
                <div class="tagline-wrap-2" aria-hidden="true">
                    <p class="tagline"><strong>Don't pay full price</strong> for tech.</p>
                </div>
            </div>

            <!-- CTA -->
            <div class="cta-wrap">
                <div class="cta-btn">
                    <span>Explore All Deals</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M5 12h14M13 6l6 6-6 6" />
                    </svg>
                </div>
            </div>
        </div>

        <script>
            if (/[?&]light/.test(location.search)) document.body.classList.add('light-mode');
            if (/[?&]xda/.test(location.search)) document.body.classList.add('xda-mode');
        </script>
        <script>
            var clickTag = document.body.classList.contains('xda-mode')
                ? 'https://www.xda-developers.com/deals/'
                : 'https://www.howtogeek.com/deals/';
            document.getElementById('click').addEventListener('click', function (e) {
                e.preventDefault();
                window.open(clickTag, '_blank', 'noopener,noreferrer');
            });

            var root = document.getElementById('ad-root');
            var PHASE_MS = 3500;

            // CTA pulses after first full cycle — added once, never removed
            setTimeout(function () { root.classList.add('looping'); }, 6000);

            // phase-1 → phase-2 → phase-3 → idle → repeat
            function runCycle() {
                setTimeout(function () {
                    root.classList.remove('phase-idle');
                    root.classList.add('phase-2');
                    setTimeout(function () {
                    root.classList.add('phase-3');
                    // Force-restart the text-fill animation on the re-entering tagline-1
                    // strong. Without this, in dark mode the animation already fired
                    // off-screen during the phase-2 exit (name never changed), so
                    // phase-3 sees the same name and skips it. In light mode the
                    // competing !important rules cause a double-flash instead.
                    var s = root.querySelector('.tagline-wrap .tagline strong');
                    if (s) { s.style.setProperty('animation-name','none','important'); void s.offsetWidth; s.style.removeProperty('animation-name'); }
                    setTimeout(function () {
                            // Freeze elements in visible state before removing phase classes
                            // so there is no jump back to off-screen on loop reset
                            root.classList.add('phase-idle');
                            root.classList.remove('phase-2', 'phase-3');
                            runCycle();
                        }, PHASE_MS);
                    }, PHASE_MS);
                }, PHASE_MS);
            }

            runCycle();
        </script>
    </body>
</html>
