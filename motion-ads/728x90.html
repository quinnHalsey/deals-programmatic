<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="ad.size" content="width=728,height=90" />
        <meta name="viewport" content="width=728,height=90" />
        <title>How-To Geek — Deals Center 728×90</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 728px;
                height: 90px;
                overflow: hidden;
                background: #101010;
            }
            #ad-root {
                position: relative;
                width: 728px;
                height: 90px;
                overflow: hidden;
                background: #101010;
                display: flex;
                align-items: stretch;
            }
            a.exit {
                position: absolute;
                inset: 0;
                z-index: 10;
                display: block;
                text-decoration: none;
                cursor: pointer;
            }
            a.exit:focus-visible {
                outline: 3px solid #f7941d;
                outline-offset: -3px;
            }

            /* ── Logo section ── */
            .logo-section {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                justify-content: center;
                padding: 0 16px 0 16px;
                gap: 5px;
                flex: 0 0 auto;
                overflow: hidden;
            }
            .logo-img {
                display: block;
                width: 144px;
                height: auto;
                transform: translateX(-220px);
                opacity: 0;
                animation: slide-from-left 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.08s forwards;
            }
            .logo-tagline {
                font-family: 'Roboto', system-ui, sans-serif;
                font-size: 12.5px;
                font-weight: 700;
                letter-spacing: 0.18em;
                color: #f7941d;
                text-transform: uppercase;
                transform: translateX(-220px);
                opacity: 0;
                animation: slide-from-left 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.22s forwards;
            }

            /* ── Divider ── */
            .divider {
                width: 1px;
                background: rgba(255, 255, 255, 0.09);
                align-self: stretch;
                margin: 14px 0;
                flex: 0 0 auto;
            }

            /* ── Products ── */
            .products {
                display: flex;
                align-items: center;
                justify-content: center;
                flex: 1;
                gap: 2px;
                overflow: hidden;
            }
            .product-slot {
                position: relative;
                display: flex;
                align-items: flex-end;
                justify-content: center;
                width: 110px;
                height: 90px;
                flex: 0 0 auto;
                overflow: hidden;
            }
            .product-img {
                display: block;
                max-width: 104px;
                max-height: 80px;
                object-fit: contain;
                object-position: bottom center;
                transform: translateY(100px);
                opacity: 0;
            }
            .product-slot:nth-child(1) .product-img {
                animation: slide-from-bottom 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.48s forwards;
            }
            .product-slot:nth-child(2) .product-img {
                animation: slide-from-bottom 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.66s forwards;
            }
            .product-slot:nth-child(3) .product-img {
                animation: slide-from-bottom 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.84s forwards;
            }

            /* ── Badges ── */
            .badge {
                position: absolute;
                top: 7px;
                right: 3px;
                background: #166534;
                color: #fff;
                font-family: 'Roboto', system-ui, sans-serif;
                font-size: 10.5px;
                font-weight: 700;
                letter-spacing: 0.03em;
                padding: 4px 9px;
                border-radius: 999px;
                white-space: nowrap;
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
                transform: scale(0);
                opacity: 0;
                transform-origin: center center;
            }
            .product-slot:nth-child(1) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.0s forwards;
            }
            .product-slot:nth-child(2) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.18s forwards;
            }
            .product-slot:nth-child(3) .badge {
                animation: pill-bounce-in 0.5s ease-out 1.36s forwards;
            }

            /* ── CTA ── */
            .cta-wrap {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                padding: 0 16px 0 10px;
                flex: 0 0 auto;
                transform: translateX(200px);
                opacity: 0;
                animation: slide-from-right 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.28s forwards;
            }
            .cta-btn {
                position: relative;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 11px 20px 11px 22px;
                border-radius: 4px;
                background: linear-gradient(135deg, #e95620, #c83c19);
                box-shadow: 0 3px 16px rgba(210, 70, 25, 0.4);
                font-family: 'Roboto', system-ui, sans-serif;
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 0.02em;
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
            }
            .cta-btn::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 4px;
                background: linear-gradient(135deg, #c6491b 0%, #aa3315 100%);
                opacity: 0;
                transition: opacity 0.25s ease;
                pointer-events: none;
            }
            .cta-btn svg {
                position: relative;
                flex-shrink: 0;
                width: 16px;
                height: 16px;
                transition: transform 0.25s ease;
            }
            .cta-btn span {
                position: relative;
            }
            #ad-root:hover .cta-btn::before,
            #ad-root:focus-within .cta-btn::before {
                opacity: 1;
            }
            #ad-root:hover .cta-btn svg,
            #ad-root:focus-within .cta-btn svg {
                animation: arrow-nudge 0.8s ease-in-out infinite;
            }
            #ad-root:hover .cta-btn,
            #ad-root:focus-within .cta-btn {
                animation: cta-shadow-pulse 1.1s ease-in-out infinite;
            }

            /* ── Keyframes ── */
            @keyframes slide-from-left {
                from {
                    transform: translateX(-220px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slide-from-right {
                from {
                    transform: translateX(200px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slide-from-bottom {
                from {
                    transform: translateY(100px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            @keyframes pill-bounce-in {
                0% {
                    transform: scale(0);
                    opacity: 0;
                }
                12% {
                    opacity: 1;
                }
                68% {
                    transform: scale(1.12);
                }
                82% {
                    transform: scale(0.94);
                }
                94% {
                    transform: scale(1.03);
                }
                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }
            @keyframes arrow-nudge {
                0%, 100% {
                    transform: translateX(0);
                }
                50% {
                    transform: translateX(4px);
                }
            }
            @keyframes cta-shadow-pulse {
                0%, 100% {
                    box-shadow:
                        0 3px 16px rgba(192, 86, 32, 0.45),
                        0 0 0 0px rgba(192, 86, 32, 0);
                }
                50% {
                    box-shadow:
                        0 5px 24px rgba(192, 86, 32, 0.75),
                        0 0 0 4px rgba(192, 86, 32, 0.15);
                }
            }

            /* ── Reduced motion ── */
            @media (prefers-reduced-motion: reduce) {
                .logo-img,
                .logo-tagline {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
                .product-img {
                    animation: none !important;
                    transform: translateY(0) !important;
                    opacity: 1 !important;
                }
                .badge {
                    animation: none !important;
                    transform: scale(1) !important;
                    opacity: 1 !important;
                }
                .cta-wrap {
                    animation: none !important;
                    transform: translateX(0) !important;
                    opacity: 1 !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="ad-root" role="region" aria-label="Advertisement: How-To Geek Deals Center">
            <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer" aria-label="Shop How-To Geek Deals — opens in new tab"></a>

            <!-- Logo -->
            <div class="logo-section">
                <img class="logo-img" src="../assets/htg-logo.svg" alt="How-To Geek" width="144" height="24" decoding="async" />
                <span class="logo-tagline">Deals Center</span>
            </div>

            <div class="divider"></div>

            <!-- Products -->
            <div class="products">
                <div class="product-slot">
                    <img class="product-img" src="../assets/sony-vlog-camera.png" alt="" decoding="async" />
                    <div class="badge">-$152</div>
                </div>
                <div class="product-slot">
                    <img class="product-img" src="../assets/mic.png" alt="" decoding="async" />
                    <div class="badge">-10%</div>
                </div>
                <div class="product-slot">
                    <img class="product-img" src="../assets/gaming-headset.png" alt="" decoding="async" />
                    <div class="badge">-50%</div>
                </div>
            </div>

            <!-- CTA -->
            <div class="cta-wrap">
                <div class="cta-btn">
                    <span>Shop All Deals</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M5 12h14M13 6l6 6-6 6" />
                    </svg>
                </div>
            </div>
        </div>

        <script>
            var clickTag = 'https://www.howtogeek.com/deals/';
            document.getElementById('click').addEventListener('click', function (e) {
                e.preventDefault();
                window.open(clickTag, '_blank', 'noopener,noreferrer');
            });
        </script>
    </body>
</html>
