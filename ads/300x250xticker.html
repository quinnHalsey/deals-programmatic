<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="ad.size" content="width=300,height=250">
  <meta name="viewport" content="width=300,height=250">
  <title>How-To Geek — Deals Center 300×250 (newsletter ticker)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 300px; height: 250px; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    @keyframes deals-cta-ticker-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    @keyframes deals-cta-btn-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 106, 34, 0.45); }
      50% { box-shadow: 0 0 0 8px rgba(255, 106, 34, 0); }
    }
    #ad-root {
      width: 300px; height: 250px; position: relative;
      border: 1px solid #1a1f2e;
      background: linear-gradient(160deg, #0f1218 0%, #1a2230 50%, #121820 100%);
      overflow: hidden;
    }
    #ad-root::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(circle at 50% 0%, rgba(255, 106, 0, 0.18) 0%, transparent 45%);
      animation: glow-breathe 3s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes glow-breathe {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }
    a.exit {
      display: flex; flex-direction: column; align-items: stretch;
      width: 100%; height: 100%; padding: 0 0 6px;
      position: relative; z-index: 2;
      text-decoration: none; color: #eef2f8; text-align: center; cursor: pointer;
      padding-top: 8px;
    }
    .ticker-wrap {
      width: 100%; height: 82px; flex-shrink: 0;
      overflow: hidden;
    }
    .ticker-track {
      display: flex; flex-direction: row; flex-wrap: nowrap;
      width: max-content; height: 82px;
      animation: deals-cta-ticker-scroll 42s linear infinite;
    }
    .ticker-seg {
      display: flex; flex-direction: row; flex-shrink: 0;
      height: 82px;
    }
    .deal-card {
      position: relative; flex: 0 0 115px; width: 115px; height: 82px;
      margin-right: 10px; border-radius: 7px; overflow: hidden;
      background: #12151c;
      contain: layout style paint;
    }
    .deal-card img {
      display: block; width: 115px; height: 82px; object-fit: cover;
      filter: blur(2px); transform: scale(1.06);
    }
    .deal-badge {
      text-transform: uppercase;
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      z-index: 1;
      font-size: 8px; font-weight: 800; letter-spacing: 0.35px; line-height: 1;
      padding: 3px 6px; border-radius: 3px; white-space: nowrap;
      color: #fff;
      font-family: inherit;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }
    .deal-badge--green { background-color: #2d8e3c; }
    .deal-badge--orange { background-color: #e87400; }
    .body {
      flex: 1; display: flex; flex-direction: column;
      padding: 24px;
       min-height: 0;
    }
    .headline {
      font-size: 24px; font-weight: 700; line-height: 1.15;
      margin-bottom: 3px; color: #fff;
    }
    .sub {
      font-size: 16px; line-height: 1.3; color: #aeb8ca; margin-bottom: 6px;
    }
    .cta-wrap {
      margin-top: auto; padding-top: 2px;
    }
    .cta {
      display: flex; align-items: center; justify-content: center;
      width: 100%; max-width: 268px; margin: 0 auto;
      min-height: 32px; padding: 6px 12px;
      font-size: 12px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #ff6a22 0%, #d84300 100%);
      border-radius: 8px;
      box-shadow: 0 0 0 0 rgba(255, 106, 34, 0.45);
      animation: deals-cta-btn-glow 2.5s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      #ad-root::after, .ticker-track, .cta { animation: none !important; }
      .cta { box-shadow: 0 0 0 0 rgba(255, 106, 34, 0.35); }
    }
  </style>
</head>
