<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="ad.size" content="width=320,height=50" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
        <title>How-To Geek — Deals Center</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 320px;
                height: 50px;
                overflow: hidden;
                font-family:
                    system-ui,
                    -apple-system,
                    'Segoe UI',
                    Roboto,
                    sans-serif;
                -webkit-font-smoothing: antialiased;
            }
            #ad-root {
                width: 320px;
                height: 50px;
                position: relative;
                border: 1px solid #c8ced9;
                background: linear-gradient(90deg, #f4f6fa 0%, #e8ecf4 100%);
                overflow: hidden;
            }
            .sheen {
                position: absolute;
                top: 0;
                left: -60%;
                width: 50%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.65), transparent);
                animation: sheen-move 2.8s ease-in-out infinite;
            }
            @keyframes sheen-move {
                0% {
                    left: -60%;
                }
                100% {
                    left: 120%;
                }
            }
            a.exit {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                height: 100%;
                padding: 0 10px 0 12px;
                position: relative;
                z-index: 2;
                text-decoration: none;
                color: #1a1f2e;
                cursor: pointer;
            }
            .brand {
                font-weight: 800;
                font-size: 11px;
                white-space: nowrap;
            }
            .brand span {
                color: #e85a00;
            }
            .mid {
                flex: 1;
                text-align: center;
                padding: 0 4px;
                min-width: 0;
                font-size: 14px;
                font-weight: 600;
                color: #3d4a5c;
                position: relative;
                align-self: center;
            }
            .mid-slides {
                position: relative;
                height: 1.25em;
                overflow: visible;
            }
            .mid-line {
                position: absolute;
                left: 0;
                right: 0;
                top: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                will-change: opacity, transform;
                animation-duration: 4s;
                animation-timing-function: cubic-bezier(0.33, 0.86, 0.2, 1);
                animation-iteration-count: infinite;
            }
            .mid-line:nth-child(1) {
                animation-name: mid-a;
            }
            .mid-line:nth-child(2) {
                animation-name: mid-b;
            }
            @keyframes mid-a {
                0% {
                    opacity: 0;
                    transform: translateY(0.55em);
                }
                6% {
                    opacity: 1;
                    transform: translateY(0);
                }
                40% {
                    opacity: 1;
                    transform: translateY(0);
                }
                50% {
                    opacity: 0;
                    transform: translateY(-0.5em);
                }
                50.01%,
                100% {
                    opacity: 0;
                    transform: translateY(-0.5em);
                }
            }
            @keyframes mid-b {
                0%,
                49.5% {
                    opacity: 0;
                    transform: translateY(0.55em);
                }
                56% {
                    opacity: 1;
                    transform: translateY(0);
                }
                88% {
                    opacity: 1;
                    transform: translateY(0);
                }
                100% {
                    opacity: 0;
                    transform: translateY(-0.5em);
                }
            }
            .cta {
                font-size: 11px;
                font-weight: 700;
                color: #fff;
                background: linear-gradient(135deg, #ff6a22, #c73d00);
                padding: 7px 10px;
                border-radius: 5px;
                white-space: nowrap;
                animation: mini-pulse 1.8s ease-in-out infinite;
            }
            .brand,
            .mid,
            .cta {
                line-height: 1.15;
            }
            @keyframes mini-pulse {
                0%,
                100% {
                    filter: brightness(1);
                }
                50% {
                    filter: brightness(1.12);
                }
            }
            @media (prefers-reduced-motion: reduce) {
                .sheen,
                .cta,
                .mid-line {
                    animation: none !important;
                }
                .mid-line {
                    opacity: 0;
                    transform: none;
                }
                .mid-line:first-child {
                    opacity: 1;
                    position: relative;
                }
            }
        </style>
    </head>
    <body>
        <div id="ad-root" role="img" aria-label="Go to the How-To Geek Deals Center">
            <div class="sheen" aria-hidden="true"></div>
            <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer">
                <div class="brand">HTG <span>Deals</span></div>
                <div class="mid" aria-live="polite">
                    <div class="mid-slides">
                        <span class="mid-line">Top Tech Deals</span>
                        <span class="mid-line">Up to 50% Off</span>
                    </div>
                </div>
                <span class="cta">See Deals</span>
            </a>
        </div>
        <script>
            var clickTag = 'https://www.howtogeek.com/deals/';
            document.getElementById('click').addEventListener('click', function (e) {
                e.preventDefault();
                window.open(clickTag, '_blank', 'noopener,noreferrer');
            });
        </script>
    </body>
</html>
