<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="ad.size" content="width=300,height=600">
  <meta name="viewport" content="width=300,height=600">
  <title>How-To Geek — Deals Center 300×600 (light, placeholder)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 300px; height: 600px; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #ad-root {
      width: 300px; height: 600px; position: relative;
      border: 1px solid #c8ced9;
      background: linear-gradient(180deg, #eef1f6 0%, #e0e6ee 45%, #d8dee8 100%);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="ad-root" role="img" aria-label="300×600 light ad placeholder"></div>
</body>
</html>
