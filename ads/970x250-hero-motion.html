<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="ad.size" content="width=970,height=250">
  <meta name="viewport" content="width=970,height=250">
  <title>How-To Geek — Deals Center hero motion 970×250</title>
  <style>
    @property --iris-r {
      syntax: "<percentage>";
      inherits: false;
      initial-value: 0%;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 970px; height: 250px; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #ad-root {
      --htg-orange: #f7941d;
      --htg-orange-deep: #e05900;
      --bg0: #eef1f6;
      --bg1: #e2e7ef;
      --bg2: #d8dee8;
      --border: #c8ced9;
      width: 970px;
      height: 250px;
      position: relative;
      border: 1px solid var(--border);
      background: linear-gradient(115deg, var(--bg0) 0%, var(--bg1) 40%, var(--bg2) 100%);
      overflow: hidden;
    }
    a.exit {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    /* Left ~1/3: product + iris reveal */
    .left-stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 33.333%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 14px;
      border-right: 1px solid rgba(180, 190, 208, 0.55);
    }
    .reveal-inner {
      position: relative;
      width: 100%;
      max-width: 300px;
      height: 100%;
      max-height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-photo {
      display: block;
      width: 100%;
      max-width: 240px;
      height: auto;
      max-height: 190px;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 10px 22px rgba(40, 55, 80, 0.18));
    }
    .pct-tag {
      position: absolute;
      top: 10%;
      right: 8%;
      padding: 7px 12px 7px 11px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: #fff;
      background: linear-gradient(140deg, var(--htg-orange) 0%, var(--htg-orange-deep) 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.35),
        0 6px 18px rgba(224, 89, 0, 0.35);
      z-index: 2;
    }
    .iris {
      --iris-r: 0%;
      position: absolute;
      inset: -4px;
      border-radius: 12px;
      background: linear-gradient(125deg, var(--bg0) 0%, var(--bg1) 45%, var(--bg2) 100%);
      z-index: 3;
      pointer-events: none;
      mask-image: radial-gradient(
        circle at 50% 48%,
        transparent max(0%, calc(var(--iris-r) - 1.8%)),
        #000 calc(var(--iris-r) + 2.2%)
      );
      -webkit-mask-image: radial-gradient(
        circle at 50% 48%,
        transparent max(0%, calc(var(--iris-r) - 1.8%)),
        #000 calc(var(--iris-r) + 2.2%)
      );
      mask-repeat: no-repeat;
      -webkit-mask-repeat: no-repeat;
      animation: iris-smooth 9s cubic-bezier(0.33, 0.86, 0.2, 1) infinite;
    }
    @keyframes iris-smooth {
      0% {
        --iris-r: 0%;
        opacity: 1;
      }
      52% {
        --iris-r: 94%;
        opacity: 1;
      }
      62% {
        --iris-r: 102%;
        opacity: 1;
      }
      66% {
        --iris-r: 102%;
        opacity: 0;
      }
      67% {
        --iris-r: 0%;
        opacity: 0;
      }
      74% {
        --iris-r: 0%;
        opacity: 0;
      }
      75% {
        --iris-r: 0%;
        opacity: 1;
      }
      100% {
        --iris-r: 0%;
        opacity: 1;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .iris {
        animation: none;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="ad-root" role="img" aria-label="Deal spotlight with twenty-five percent off. Visit How-To Geek Deals.">
    <a class="exit" id="click" href="#" target="_blank" rel="noopener noreferrer">
      <div class="left-stage">
        <div class="reveal-inner">
          <img
            class="product-photo"
            src="https://static0.howtogeekimages.com/wordpress/wp-content/uploads/wm/2026/04/pixel-10-with-action-button-outline.jpg?q=49&amp;fit=crop&amp;w=900&amp;h=560&amp;dpr=2"
            alt=""
            width="480"
            height="320"
            loading="lazy">
          <span class="pct-tag">−25% off</span>
          <div class="iris" aria-hidden="true"></div>
        </div>
      </div>
    </a>
  </div>
  <script>
    var clickTag = 'https://www.howtogeek.com/deals/';
    document.getElementById('click').addEventListener('click', function (e) {
      e.preventDefault();
      window.open(clickTag, '_blank', 'noopener,noreferrer');
    });
  </script>
</body>
</html>
